task: mathqa_local
dataset_path: parquet
dataset_kwargs:
  data_files:
    train: /home/xiyaofeng/huicheng/SVD_LLM/data/mathqa_parquet/train.parquet
    test: /home/xiyaofeng/huicheng/SVD_LLM/data/mathqa_parquet/test.parquet
    validation: /home/xiyaofeng/huicheng/SVD_LLM/data/mathqa_parquet/validation.parquet
output_type: multiple_choice
training_split: train
validation_split: validation
test_split: test
doc_to_text: "Question: {{Problem}}\nAnswer:"
